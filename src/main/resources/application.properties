# ========================================
# DocLeaf 配置
# ========================================
spring.application.name=DocLeaf

# 服务端口
server.port=8080

# 确保 HTTP 编码为 UTF-8
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true

# ========================================
# DocLeaf 文档生成器配置
# ========================================

# 源码根目录（相对于 user.dir，用于 JavaDoc 提取）
# 默认为 src/main/java，通常无需修改
docleaf.source-root=src/main/java

# 是否启用 JavaDoc 注释提取（阶段二功能）
# 启用后会从 .java 源文件中提取注释作为接口描述
# 如果源文件不可用（如 JAR 部署），会自动回退为方法名
docleaf.javadoc.enabled=true
