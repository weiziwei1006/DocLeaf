# ========================================
# DocLeaf 配置
# ========================================
spring.application.name=DocLeaf

# 服务端口
server.port=8000

# 确保 HTTP 编码为 UTF-8
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true

# ========================================
# DocLeaf 文档生成器配置
# ========================================

# 源码根目录（相对于 user.dir，用于 JavaDoc 提取）
docleaf.source-root=src/main/java

# 是否启用 JavaDoc 注释提取（阶段二功能）
docleaf.javadoc.enabled=true

# 输出目录（相对于 user.dir，所有文档文件统一输出到此目录）
docleaf.output.dir=outdoc

# 输出格式（逗号分隔，可选：markdown, openapi, html）
# 默认全部输出
docleaf.output.formats=markdown,openapi,html
